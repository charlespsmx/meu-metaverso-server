<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VIBE GRID | Metaverso Social</title>
    <!-- Bibliotecas Externas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --bg: #050505;
            --panel: rgba(15, 15, 15, 0.9);
            --text: #e0e0e0;
            --neon-glow: 0 0 15px rgba(0, 242, 255, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            overflow: hidden; 
            background: var(--bg); 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: var(--text);
            touch-action: none;
        }

        /* TELA DE LOGIN */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111, #000);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
        }

        .login-box {
            background: var(--panel);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid var(--primary);
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.15);
            max-width: 400px;
            width: 90%;
        }

        h1 { 
            color: var(--primary); 
            margin-bottom: 10px; 
            letter-spacing: 4px; 
            font-size: 2rem;
            text-shadow: var(--neon-glow);
        }

        .subtitle { color: #666; margin-bottom: 25px; font-size: 0.9rem; }

        input { 
            padding: 15px; 
            width: 100%; 
            border-radius: 8px; 
            border: 1px solid #333; 
            background: #0a0a0a; 
            color: white; 
            margin-bottom: 20px; 
            outline: none;
            transition: border 0.3s;
        }

        input:focus { border-color: var(--primary); }

        button {
            padding: 15px 40px; 
            background: var(--primary); 
            border: none;
            border-radius: 8px; 
            font-weight: bold; 
            color: #000;
            cursor: pointer; 
            transition: all 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--neon-glow);
            filter: brightness(1.1);
        }

        /* UI DO JOGO */
        #ui-layer { 
            position: fixed; 
            top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 10;
        }

        .interactive { pointer-events: auto; }

        /* PAINEL DE STATUS */
        #status-panel {
            position: fixed; top: 20px; left: 20px;
            background: var(--panel);
            padding: 12px 20px;
            border-radius: 30px;
            border-left: 4px solid var(--primary);
            font-size: 12px;
            display: flex; align-items: center; gap: 15px;
            backdrop-filter: blur(10px);
        }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #555; }
        .online { background: #00ff88; box-shadow: 0 0 8px #00ff88; }

        /* CHAT */
        #chat-container {
            position: fixed; bottom: 20px; left: 20px; width: 350px;
            background: var(--panel);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            display: flex; flex-direction: column;
        }

        #chat-messages {
            height: 220px; overflow-y: auto;
            padding: 15px; font-size: 14px;
            scrollbar-width: thin; scrollbar-color: var(--primary) transparent;
        }

        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-thumb { background: var(--primary); }

        .message { margin-bottom: 10px; line-height: 1.4; animation: fadeIn 0.3s ease; }
        .m-name { color: var(--primary); font-weight: bold; margin-right: 6px; }
        .m-system { color: #888; font-style: italic; font-size: 12px; }

        #chat-input {
            background: rgba(0,0,0,0.3);
            border: none; border-top: 1px solid rgba(255,255,255,0.1);
            padding: 15px; color: white; border-radius: 0 0 12px 12px;
            outline: none;
        }

        #chat-input:focus { border-top-color: var(--primary); }

        /* INSTRUÇÕES */
        #controls-hint {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--panel); padding: 15px;
            border-radius: 10px; font-size: 11px; color: #888;
            border: 1px solid rgba(255,255,255,0.05);
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="login-screen">
        <div class="login-box">
            <h1>VIBE GRID</h1>
            <p class="subtitle">Insira seu avatar no plano digital</p>
            <input type="text" id="username" placeholder="Apelido..." maxlength="15" autocomplete="off">
            <button id="btn-enter" onclick="requestEnter()">Inicializar Conexão</button>
            <p id="conn-status" style="margin-top:15px; font-size:10px; color:#444;">Standby: Aguardando Entrada</p>
        </div>
    </div>

    <!-- CAMADA DE INTERFACE -->
    <div id="ui-layer">
        <div id="status-panel">
            <div id="indicator" class="status-dot"></div>
            <span><b>SERVIDOR:</b> Social Lobby</span>
            <span><b>PING:</b> <span id="ping-val">--</span>ms</span>
        </div>

        <div id="chat-container" class="interactive">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Pressione Enter para falar..." maxlength="100">
        </div>

        <div id="controls-hint">
            <b>WASD</b> ANDAR | <b>MOUSE</b> OLHAR | <b>ENTER</b> CHAT
        </div>
    </div>

    <script>
        /**
         * VIBE GRID ENGINE - VERSÃO CORRIGIDA
         */

        // CONFIGURAÇÕES DE REDE
        // MUITO IMPORTANTE: Troque a URL abaixo pela URL do seu Render.com
        const SERVER_URL = "https://meu-metaverso-server.onrender.com"; 
        
        let scene, camera, renderer, socket;
        let myAvatar, myName;
        let isInitialized = false;
        let otherPlayers = {};
        let moveState = { w: false, a: false, s: false, d: false };

        const loginScreen = document.getElementById('login-screen');
        const chatInput = document.getElementById('chat-input');
        const chatMessages = document.getElementById('chat-messages');
        const pingDisplay = document.getElementById('ping-val');
        const statusIndicator = document.getElementById('indicator');

        function requestEnter() {
            const input = document.getElementById('username');
            myName = input.value.trim();

            if (myName.length < 2) {
                alert("O apelido deve ter pelo menos 2 caracteres.");
                return;
            }

            // Iniciar 3D primeiro
            init3D();

            // Tentar conectar ao Socket
            try {
                connectSocket();
            } catch (e) {
                console.log("Servidor não respondeu. Entrando em modo solo.");
            }

            // Esconder tela de login
            loginScreen.style.opacity = '0';
            setTimeout(() => {
                loginScreen.style.display = 'none';
                isInitialized = true;
            }, 800);
        }

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x050505, 15, 60);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0x404040, 1); 
            scene.add(ambientLight);
            
            // CORREÇÃO AQUI: Usando cor Hexadecimal ao invés de variável CSS
            const sunLight = new THREE.DirectionalLight(0x00f2ff, 0.5);
            sunLight.position.set(5, 10, 7);
            scene.add(sunLight);

            const gridHelper = new THREE.GridHelper(100, 50, 0x00f2ff, 0x222222);
            scene.add(gridHelper);

            myAvatar = createAvatar(myName, 0x00f2ff);
            scene.add(myAvatar);

            window.addEventListener('resize', onResize);
            window.addEventListener('keydown', (e) => handleKeys(e.key.toLowerCase(), true));
            window.addEventListener('keyup', (e) => handleKeys(e.key.toLowerCase(), false));
            chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendChat(); });

            renderLoop();
        }

        function createAvatar(name, colorCode) {
            const group = new THREE.Group();
            const bodyGeo = new THREE.CapsuleGeometry(0.4, 1, 4, 12);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorCode });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.9;
            group.add(body);

            const visor = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 0.1, 0.2),
                new THREE.MeshBasicMaterial({ color: 0xffffff })
            );
            visor.position.set(0, 1.4, 0.3);
            group.add(visor);

            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 512; canvas.height = 128;
            ctx.fillStyle = 'rgba(0,0,0,0.5)';
            ctx.fillRect(0,0,512,128);
            ctx.font = 'bold 60px Arial';
            ctx.fillStyle = 'white';
            ctx.textAlign = 'center';
            ctx.fillText(name, 256, 85);

            const tex = new THREE.CanvasTexture(canvas);
            const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: tex }));
            sprite.position.y = 2.4;
            sprite.scale.set(2, 0.5, 1);
            group.add(sprite);

            return group;
        }

        function connectSocket() {
            socket = io(SERVER_URL, { reconnectionAttempts: 5 });

            socket.on('connect', () => {
                statusIndicator.classList.add('online');
                socket.emit('join-world', { name: myName });
                addMessage("Sistema", "Conectado ao Vibe Grid.");
            });

            socket.on('current-players', (players) => {
                Object.keys(players).forEach(id => {
                    if (id !== socket.id) addRemotePlayer(id, players[id]);
                });
            });

            socket.on('player-joined', (data) => {
                addRemotePlayer(data.id, data);
            });

            socket.on('player-moved', (data) => {
                if (otherPlayers[data.id]) {
                    otherPlayers[data.id].position.set(data.x, 0, data.z);
                    otherPlayers[data.id].rotation.y = data.ry;
                }
            });

            socket.on('new-chat-message', (data) => {
                addMessage(data.name, data.message);
            });

            socket.on('player-left', (id) => {
                if (otherPlayers[id]) {
                    scene.remove(otherPlayers[id]);
                    delete otherPlayers[id];
                }
            });
        }

        function addRemotePlayer(id, data) {
            if (otherPlayers[id]) return;
            const avatar = createAvatar(data.name, 0x7000ff);
            scene.add(avatar);
            otherPlayers[id] = avatar;
        }

        function handleKeys(key, isDown) {
            if (document.activeElement === chatInput) return;
            if (key === 'w') moveState.w = isDown;
            if (key === 's') moveState.s = isDown;
            if (key === 'a') moveState.a = isDown;
            if (key === 'd') moveState.d = isDown;
        }

        function updateMovement() {
            if (!myAvatar) return;
            const speed = 0.12;
            const rotSpeed = 0.04;
            let moved = false;

            if (moveState.w) { myAvatar.translateZ(speed); moved = true; }
            if (moveState.s) { myAvatar.translateZ(-speed); moved = true; }
            if (moveState.a) { myAvatar.rotation.y += rotSpeed; moved = true; }
            if (moveState.d) { myAvatar.rotation.y -= rotSpeed; moved = true; }

            if (moved && socket && socket.connected) {
                socket.emit('move', {
                    x: myAvatar.position.x,
                    z: myAvatar.position.z,
                    ry: myAvatar.rotation.y
                });
            }

            const offset = new THREE.Vector3(0, 3, -6);
            offset.applyQuaternion(myAvatar.quaternion);
            camera.position.lerp(myAvatar.position.clone().add(offset), 0.1);
            camera.lookAt(myAvatar.position.x, myAvatar.position.y + 1, myAvatar.position.z);
        }

        function sendChat() {
            const text = chatInput.value.trim();
            if (!text) return;
            if (socket && socket.connected) socket.emit('chat-message', { name: myName, message: text });
            chatInput.value = "";
        }

        function addMessage(user, msg) {
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = `<span class="m-name">${user}:</span> ${msg}`;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            if (isInitialized) updateMovement();
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
